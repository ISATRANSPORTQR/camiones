<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Oficial de Certificación Vehicular</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    .valid {
      color: green;
      font-weight: bold;
      margin-top: 15px;
    }

    .invalid {
      color: red;
      font-weight: bold;
    }

    hr {
      margin: 20px 0;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🚛 Registro Oficial</h1>
  <div id="info"></div>
</div>

<script>
const data = {
  "001": {placa:"", marca:"", modelo:"", vin:"", motor:"", slv:"", certificador:"", telefono:""},

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (data[id]) {
  const c = data[id];
  document.getElementById("info").innerHTML = `

  `;

  document.getElementById("info").innerHTML =
    "<div class='invalid'>❌ CAMIÓN NO ENCONTRADO</div>";
}

</html>
